<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>异常诊断</title>
  <style>
    body { font-family:"Microsoft YaHei",sans-serif; background:#f4f7fb; margin:0; }
    .nav { background:#111827; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; }
    .nav a { color:#dbeafe; text-decoration:none; margin-left:14px; }
    .wrap { max-width:920px; margin:24px auto; padding:0 16px; }
    .card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    label { display:block; margin:12px 0 6px; font-weight:600; }
    input { width:100%; box-sizing:border-box; border:1px solid #cbd5e1; border-radius:8px; padding:10px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    button { margin-top:18px; border:none; border-radius:8px; padding:12px 16px; background:#2563eb; color:#fff; font-weight:700; cursor:pointer; }
    .hint { color:#475467; font-size:14px; }
  </style>
</head>
<body>
  <div class="nav">
    <div>异常诊断</div>
    <div>用户：{{ username }} | 角色：{{ role }} <a href="/role">角色页</a> <a href="/history">历史记录</a> <a href="/logout">退出</a></div>
  </div>
  <div class="wrap">
    <div class="card">
      <h2>班组长诊断表单</h2>
      <p class="hint">输入越完整，建议排序越精准；不确定可填 `unknown`。</p>
      <form method="post" action="/diagnose">
        <label>问题编号（可空）</label>
        <input name="request_id" placeholder="REQ-20260101-001">
        <div class="row">
          <div>
            <label>工序（Pxx 或 中文）</label>
            <input name="process" placeholder="焊锡 / P10">
          </div>
          <div>
            <label>症状（逗号分隔）</label>
            <input name="symptoms" placeholder="焊盘开口,虚焊">
          </div>
        </div>
        <div class="row">
          <div>
            <label>不良率</label>
            <input name="defect_rate" placeholder="3% 或 0.03">
          </div>
          <div>
            <label>湿度</label>
            <input name="humidity" placeholder="58 或 unknown">
          </div>
        </div>
        <div class="row">
          <div>
            <label>助焊剂在岗时长（小时）</label>
            <input name="flux_age_hours" placeholder="1.5">
          </div>
          <div>
            <label>炉温波动</label>
            <input name="oven_temp_delta" placeholder="330+-10℃ 或 10">
          </div>
        </div>
        <label>返回候选数量 top_k</label>
        <input name="top_k" value="3">
        <button type="submit">开始诊断</button>
      </form>
    </div>
  </div>
</body>
</html>
