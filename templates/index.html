<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工艺决策辅助系统</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background:#f3f6fa; margin:0; }
    .wrap { max-width: 900px; margin: 40px auto; padding: 24px; }
    .card { background:#fff; border-radius:12px; padding:24px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:20px; }
    .btn { display:block; text-decoration:none; padding:16px; border-radius:10px; text-align:center; color:#fff; font-weight:600; }
    .diag { background:#1570ef; }
    .opt { background:#0d8f62; }
    .sub { color:#3a4552; line-height:1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>工艺知识驱动的决策辅助系统</h1>
      <p class="sub">本地运行版。班组长走“异常诊断”，工程师走“路径优化”。输入表单后系统直接给出可执行建议并保存结果报告。</p>
      <div class="grid">
        <a class="btn diag" href="/diagnose">进入异常诊断</a>
        <a class="btn opt" href="/optimize">进入路径优化</a>
      </div>
    </div>
  </div>
</body>
</html>
