{% extends "_base_shell.html" %}

{% block title %}登录 - 工艺决策辅助系统{% endblock %}

{% block shell %}
<main class="auth-shell">
  <section class="auth-card" aria-label="登录卡片">
    <h1 class="auth-title">系统登录</h1>
    <p class="auth-subtitle">请输入账号进入班组长或工程师工作入口。</p>

    <form method="post" action="/login">
      <div class="field-group" style="margin-top:12px;">
        <label for="username">账号</label>
        <input id="username" name="username" placeholder="user" autocomplete="username">
      </div>

      <div class="field-group" style="margin-top:10px;">
        <label for="password">密码</label>
        <input id="password" type="password" name="password" placeholder="请输入密码" autocomplete="current-password">
      </div>

      <div class="action-row" style="margin-top:14px;">
        <button class="button-primary" type="submit" style="width:100%;">登录系统</button>
      </div>
    </form>

    {% if error %}
    <div class="error-box" style="margin-top:10px;">{{ error }}</div>
    {% endif %}
  </section>
</main>
{% endblock %}
